name: Tests

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest

    env:
      COMPOSER_CACHE_DIR: ~/.composer/cache

    strategy:
      fail-fast: false
      matrix:
        php: [8.3, 8.4, 8.5]
        laravel: ['12.*', '13.*']
        stability: [prefer-lowest, prefer-stable]

    name: PHP ${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          extensions: mbstring, curl, fileinfo
          ini-values: memory_limit=-1

      - name: Validate composer.json
        run: composer validate --strict

      - name: Configure Composer
        run: |
          composer config --global process-timeout 2000
          composer config --global github-protocols https

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.stability }}-${{ hashFiles(...) }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.laravel }}-${{ matrix.stability }}-
            composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.laravel }}-
            composer-${{ runner.os }}-${{ matrix.php }}-
            composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
            composer-${{ runner.os }}-

      - name: Install Dependencies (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            composer require laravel/framework:${{ matrix.laravel }} --no-interaction --no-update

            composer update \
              --${{ matrix.stability }} \
              --prefer-dist \
              --no-interaction \
              --no-progress \
              $([[ "${{ matrix.stability }}" == "prefer-lowest" ]] && echo "--prefer-stable")

      - name: Check platform requirements
        run: composer check-platform-reqs

      - name: Security Audit
        if: matrix.stability == 'prefer-stable'
        run: composer audit --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Run Tests
        run: vendor/bin/pest --no-coverage
